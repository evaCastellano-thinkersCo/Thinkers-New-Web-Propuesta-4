<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pruebas</title>
  <link rel="stylesheet" href="/assets/css/plugins/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
  </style>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="columna col-12 col-lg-6">
        <p>Siempre estamos listos para nuevos desafíos</p>
        <h2>¿Empezamos a hablar?</h2>
        <p>Déjanos tu información y nos pondremos en contacto contigo a la brevedad.</p>
      </div>
      <div class="columna col-12 col-lg-6">
        <form method="post" id="contact-form">
          <div class="row">
            <div class="cs_field_group col">
              <input class="cs_input_field" type="text" placeholder="Name" name="nombre" id="nombre" required />
              <label for="nombre" class="cs_input_label">Nombre</label>
            </div>

          </div>
          <div class="cs_height_24 cs_height_lg_20"></div>
          <div class="row">
            <div class="cs_field_group col">
              <input class="cs_input_field" type="email" placeholder="Name" name="email" id="email" required />
              <label for="email" class="cs_input_label">Email</label>
            </div>
          </div>
          <div class="cs_height_24 cs_height_lg_20"></div>
          <div class="row">
            <div class="cs_field_group col">
              <input class="cs_input_field" type="number" placeholder="Name" name="telefono" id="telefono" required />
              <label for="telefono" class="cs_input_label">Teléfono</label>
            </div>
          </div>
          <div class="cs_height_24 cs_height_lg_20"></div>
          <div class="cs_field_group">
            <textarea class="cs_input_field" placeholder="Message" name="mensaje" id="detalles" required></textarea>
            <label for="detalles" class="cs_input_label">Detalles</label>
          </div>
          <div class="cs_height_60 cs_height_lg_60"></div>

          <div class="checkbox">
            <input type="checkbox" name="politica-privacidad" id="politica-privacidad" required>
            <label for="politica-privacidad">Acepto la <a target="_blank" href="politica-privacidad.html"><u><b>Política
                    de Privacidad</b></u></a> y
              que mis datos sean tratados para el envío de información solicitada y de
              comunicaciones comerciales.</label>
          </div>

          <input type="hidden" name="token" value="abc123456">

          <button type="submit" class="btn btn_primary" id="contact-submit" disabled>
            <span>Contáctanos</span>
            <svg width="19" height="13" viewBox="0 0 19 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M18.5303 7.03033C18.8232 6.73744 18.8232 6.26256 18.5303 5.96967L13.7574 1.1967C13.4645 0.903806 12.9896 0.903806 12.6967 1.1967C12.4038 1.48959 12.4038 1.96447 12.6967 2.25736L16.9393 6.5L12.6967 10.7426C12.4038 11.0355 12.4038 11.5104 12.6967 11.8033C12.9896 12.0962 13.4645 12.0962 13.7574 11.8033L18.5303 7.03033ZM0 7.25H18V5.75H0V7.25Z"
                fill="currentColor"></path>
            </svg>
          </button>
          <p id="estado"></p>
        </form>
      </div>
    </div>
  </div>
